<svg xmlns="http://www.w3.org/2000/svg" width="1830" height="900" viewBox="0 0 1830 900" role="img" aria-labelledby="title desc">
  <title id="title">Treasury Copilot architecture</title>
  <desc id="desc">A read-only flow from the Treasury Management Platform through sanitization and a Treasury Intelligence Layer to OpenAI or deterministic fallback, ending in an evidence-backed Treasury Copilot brief.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102a2e" flood-opacity="0.10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#0c6b58"/></marker>
  </defs>
  <rect width="1830" height="900" fill="#f4f6f3"/>

  <text x="80" y="82" font-family="Georgia,serif" font-size="44" fill="#102a2e">Treasury Copilot architecture</text>
  <text x="82" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#60716f">The Treasury Management Platform remains the system of record. Treasury Copilot adds read-only, evidence-grounded intelligence.</text>

  <!-- Main flow connectors. Labels sit in dedicated whitespace above each line. -->
  <g stroke="#0c6b58" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M310 365 H410"/>
    <path d="M630 365 H760"/>
    <path d="M1090 315 H1210"/>
    <path d="M1090 445 H1210"/>
    <path d="M1440 365 H1570"/>
  </g>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#60716f" text-anchor="middle">
    <text x="360" y="340">Read-only</text>
    <text x="695" y="340">Sanitized snapshot</text>
    <text x="1505" y="340">Validated output</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="245" width="230" height="240" rx="5" fill="#102a2e"/>
    <rect x="410" y="245" width="220" height="240" rx="5" fill="#ffffff" stroke="#c7d1cc"/>
    <rect x="760" y="205" width="330" height="320" rx="5" fill="#dcebe5" stroke="#aac5ba"/>
    <rect x="1210" y="245" width="230" height="110" rx="5" fill="#ffffff" stroke="#c7d1cc"/>
    <rect x="1210" y="375" width="230" height="110" rx="5" fill="#102a2e"/>
    <rect x="1570" y="245" width="180" height="240" rx="5" fill="#0c6b58"/>
  </g>

  <g font-family="Segoe UI,Arial,sans-serif">
    <text x="108" y="284" font-size="12" font-weight="700" letter-spacing="1.5" fill="#dca744">SYSTEM OF RECORD</text>
    <text x="108" y="330" font-family="Georgia,serif" font-size="26" fill="#ffffff">Treasury</text>
    <text x="108" y="363" font-family="Georgia,serif" font-size="26" fill="#ffffff">Management</text>
    <text x="108" y="396" font-family="Georgia,serif" font-size="26" fill="#ffffff">Platform</text>
    <text x="108" y="447" font-size="14" fill="#b9cac8">Excel / VBA</text>

    <text x="438" y="284" font-size="12" font-weight="700" letter-spacing="1.5" fill="#0c6b58">CLIENT ADAPTER</text>
    <text x="438" y="331" font-family="Georgia,serif" font-size="25" fill="#102a2e">Filter and</text>
    <text x="438" y="362" font-family="Georgia,serif" font-size="25" fill="#102a2e">sanitize</text>
    <text x="438" y="409" font-size="13" fill="#60716f">Organisation scope</text>
    <text x="438" y="434" font-size="13" fill="#60716f">Field allowlist</text>
    <text x="438" y="459" font-size="13" fill="#60716f">Account masking</text>

    <text x="792" y="249" font-size="12" font-weight="700" letter-spacing="1.4" fill="#0c6b58">TREASURY INTELLIGENCE LAYER</text>
    <text x="792" y="299" font-family="Georgia,serif" font-size="28" fill="#102a2e">Analytical core</text>
    <text x="792" y="354" font-size="15" fill="#345552">1  Validate trusted context</text>
    <text x="792" y="388" font-size="15" fill="#345552">2  Compute treasury facts</text>
    <text x="792" y="422" font-size="15" fill="#345552">3  Minimise model context</text>
    <text x="792" y="456" font-size="15" fill="#345552">4  Validate evidence and figures</text>
    <text x="792" y="490" font-size="15" fill="#345552">5  Fall back safely</text>

    <text x="1238" y="282" font-size="11" font-weight="700" letter-spacing="1.4" fill="#0c6b58">OPENAI</text>
    <text x="1238" y="319" font-family="Georgia,serif" font-size="21" fill="#102a2e">Structured brief</text>
    <text x="1238" y="340" font-size="11" fill="#60716f">Strict JSON Schema</text>

    <text x="1238" y="412" font-size="11" font-weight="700" letter-spacing="1.4" fill="#dca744">FALLBACK</text>
    <text x="1238" y="449" font-family="Georgia,serif" font-size="20" fill="#ffffff">Deterministic brief</text>
    <text x="1238" y="470" font-size="11" fill="#b9cac8">Always available</text>

    <text x="1594" y="283" font-size="10" font-weight="700" letter-spacing="1.1" fill="#cce6dc">TREASURY COPILOT</text>
    <text x="1594" y="331" font-family="Georgia,serif" font-size="20" fill="#ffffff">Reconciliation</text>
    <text x="1594" y="359" font-family="Georgia,serif" font-size="20" fill="#ffffff">Intelligence</text>
    <text x="1594" y="387" font-family="Georgia,serif" font-size="20" fill="#ffffff">Brief</text>
    <text x="1594" y="432" font-size="11" fill="#d7ebe4">Findings · actions</text>
    <text x="1594" y="454" font-size="11" fill="#d7ebe4">Summary · evidence</text>
  </g>

  <g font-family="Segoe UI,Arial,sans-serif">
    <rect x="80" y="600" width="1670" height="120" rx="5" fill="#ffffff" stroke="#c7d1cc"/>
    <text x="108" y="638" font-size="12" font-weight="700" letter-spacing="1.4" fill="#0c6b58">CONTROL GUARANTEES</text>
    <circle cx="126" cy="681" r="10" fill="#dcebe5"/><path d="m121 681 4 4 7-9" fill="none" stroke="#0c6b58" stroke-width="2"/>
    <text x="148" y="686" font-size="15" fill="#102a2e">Organisation-scoped</text>
    <circle cx="456" cy="681" r="10" fill="#dcebe5"/><path d="m451 681 4 4 7-9" fill="none" stroke="#0c6b58" stroke-width="2"/>
    <text x="478" y="686" font-size="15" fill="#102a2e">Deterministic calculations</text>
    <circle cx="850" cy="681" r="10" fill="#dcebe5"/><path d="m845 681 4 4 7-9" fill="none" stroke="#0c6b58" stroke-width="2"/>
    <text x="872" y="686" font-size="15" fill="#102a2e">Evidence-validated output</text>
    <circle cx="1360" cy="681" r="10" fill="#dcebe5"/><path d="m1355 681 4 4 7-9" fill="none" stroke="#0c6b58" stroke-width="2"/>
    <text x="1382" y="686" font-size="15" fill="#102a2e">No workbook writes</text>
  </g>

  <line x1="80" y1="792" x2="1750" y2="792" stroke="#c7d1cc"/>
  <text x="80" y="836" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#60716f">Platform-neutral contracts support future Excel, Google Sheets, web, Android, iOS and cloud adapters.</text>
  <text x="1750" y="836" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#0c6b58">Treasury Copilot Hackathon Edition — Final Candidate</text>
</svg>
